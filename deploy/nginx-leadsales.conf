# 绑定域名后使用（需 ICP 备案）
# 将 leadsales.yourcompany.com 解析到服务器公网 IP
# sudo cp deploy/nginx-leadsales.conf /etc/nginx/sites-available/leadsales
# 修改 server_name 后：sudo ln -s ... sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx
# sudo certbot --nginx -d leadsales.yourcompany.com

server {
    listen 80;
    server_name leadsales.yourcompany.com;
    client_max_body_size 50m;

    # 大机构报表导入可能数分钟；默认 60s 会 504
    location /api/import {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
